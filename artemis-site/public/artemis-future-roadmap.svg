<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Artemis future roadmap</title>
  <desc id="desc">A diagram showing Artemis II leading into Artemis III and a broader long-term lunar campaign.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="path" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="820" rx="36" fill="url(#bg)"/>

  <text x="78" y="92" fill="#f8fafc" font-family="Arial, sans-serif" font-size="40" letter-spacing="5">FROM ARTEMIS II TO WHAT COMES NEXT</text>
  <text x="80" y="130" fill="#94a3b8" font-family="Arial, sans-serif" font-size="22">A proving mission, a landing attempt, and the beginnings of a longer lunar campaign</text>

  <path d="M140 470 C 300 470, 360 300, 520 300 S 760 470, 920 470 S 1040 350, 1080 260" fill="none" stroke="url(#path)" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>

  <g font-family="Arial, sans-serif">
    <g transform="translate(180 470)">
      <circle r="22" fill="#38bdf8" filter="url(#glow)"/>
      <circle r="58" fill="none" stroke="#38bdf8" stroke-opacity="0.25" stroke-width="2"/>
      <text x="0" y="-92" text-anchor="middle" fill="#bae6fd" font-size="20" letter-spacing="2">PRESENT STEP</text>
      <text x="0" y="98" text-anchor="middle" fill="#f8fafc" font-size="28" letter-spacing="2">ARTEMIS II</text>
      <text x="0" y="132" text-anchor="middle" fill="#94a3b8" font-size="18">Crewed lunar proving mission</text>
      <text x="0" y="156" text-anchor="middle" fill="#94a3b8" font-size="18">Orion, SLS, operations, recovery</text>
    </g>

    <g transform="translate(540 300)">
      <circle r="22" fill="#60a5fa" filter="url(#glow)"/>
      <circle r="58" fill="none" stroke="#60a5fa" stroke-opacity="0.25" stroke-width="2"/>
      <text x="0" y="-92" text-anchor="middle" fill="#bae6fd" font-size="20" letter-spacing="2">NEXT MAJOR TEST</text>
      <text x="0" y="98" text-anchor="middle" fill="#f8fafc" font-size="28" letter-spacing="2">ARTEMIS III</text>
      <text x="0" y="132" text-anchor="middle" fill="#94a3b8" font-size="18">Planned return to the lunar surface</text>
      <text x="0" y="156" text-anchor="middle" fill="#94a3b8" font-size="18">Turns transportation confidence into landing capability</text>
    </g>

    <g transform="translate(900 470)">
      <circle r="22" fill="#818cf8" filter="url(#glow)"/>
      <circle r="58" fill="none" stroke="#818cf8" stroke-opacity="0.25" stroke-width="2"/>
      <text x="0" y="-92" text-anchor="middle" fill="#c4b5fd" font-size="20" letter-spacing="2">BEYOND THE RETURN</text>
      <text x="0" y="98" text-anchor="middle" fill="#f8fafc" font-size="28" letter-spacing="2">REPEATED MISSIONS</text>
      <text x="0" y="132" text-anchor="middle" fill="#94a3b8" font-size="18">Surface science, persistence, partner integration</text>
      <text x="0" y="156" text-anchor="middle" fill="#94a3b8" font-size="18">A campaign, not a one-off revisit</text>
    </g>

    <g transform="translate(1080 260)">
      <circle r="20" fill="#a78bfa" filter="url(#glow)"/>
      <circle r="52" fill="none" stroke="#a78bfa" stroke-opacity="0.25" stroke-width="2"/>
      <text x="0" y="-84" text-anchor="middle" fill="#ddd6fe" font-size="18" letter-spacing="2">LONGER HORIZON</text>
      <text x="0" y="90" text-anchor="middle" fill="#f8fafc" font-size="24" letter-spacing="2">DEEPER SPACE</text>
      <text x="0" y="120" text-anchor="middle" fill="#94a3b8" font-size="17">Experience that may matter</text>
      <text x="0" y="143" text-anchor="middle" fill="#94a3b8" font-size="17">for exploration beyond the Moon</text>
    </g>
  </g>

  <g fill="#94a3b8" font-family="Arial, sans-serif" font-size="18">
    <text x="150" y="710">Artemis II matters because it makes the missions after it more believable. The program’s logic depends on each step reducing</text>
    <text x="150" y="738">uncertainty for the next one: proving transportation, attempting a landing, building recurrence, and learning what sustained</text>
    <text x="150" y="766">operations beyond low Earth orbit actually require.</text>
  </g>
</svg>